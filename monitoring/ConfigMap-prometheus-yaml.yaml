apiVersion: v1
data:
  prometheus.yaml: |
    apiVersion: 1

    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus.monitoring.svc.cluster.local:9090
        jsonData:
          timeout: 60
          maxLines: 1000
kind: ConfigMap
metadata:
  name: prometheus-yaml
  namespace: monitoring
