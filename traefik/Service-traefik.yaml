apiVersion: v1
kind: Service
metadata:
  labels:
    app: traefik
    app.kubernetes.io/instance: traefik-system
    app.kubernetes.io/managed-by: Helmraiser
    app.kubernetes.io/name: traefik
    helm.sh/chart: traefik-39.0.5
  name: traefik
  namespace: system
spec:
  externalTrafficPolicy: Local
  ipFamilyPolicy: PreferDualStack
  ports:
  - name: web
    port: 80
    protocol: TCP
    targetPort: web
  - name: websecure
    port: 443
    protocol: TCP
    targetPort: websecure
  selector:
    app.kubernetes.io/instance: traefik-system
    app.kubernetes.io/name: traefik
  type: LoadBalancer
