apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: valkey
  namespace: databases
spec:
  replicas: 1
  selector:
    matchLabels:
      name: valkey
  template:
    metadata:
      labels:
        name: valkey
    spec:
      containers:
      - image: valkey/valkey:7.2.10-alpine
        imagePullPolicy: IfNotPresent
        name: valkey
        ports:
        - containerPort: 6379
          name: valkey
  updateStrategy:
    type: RollingUpdate
