apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: authelia-ingressroute
  namespace: auth
spec:
  entryPoints:
  - websecure
  routes:
  - kind: Rule
    match: Host(`auth.danielramos.me`)
    middlewares: null
    services:
    - name: authelia
      port: 9091
  tls:
    certResolver: le
