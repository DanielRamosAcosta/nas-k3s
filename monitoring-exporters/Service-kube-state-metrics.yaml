apiVersion: v1
kind: Service
metadata:
  annotations:
    prometheus.io/path: /metrics
    prometheus.io/port: "8080"
    prometheus.io/scrape: "true"
  labels:
    app: monitoring-exporters
    name: kube-state-metrics
  name: kube-state-metrics
  namespace: monitoring
spec:
  ports:
  - name: kube-state-metrics-http-metrics
    port: 8080
    targetPort: 8080
  selector:
    name: kube-state-metrics
