apiVersion: v1
data:
  prometheus.yaml: |
    apiVersion: 1

    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://victoriametrics.monitoring.svc.cluster.local:8428
        jsonData:
          timeout: 60
          maxLines: 1000
kind: ConfigMap
metadata:
  labels:
    app: grafana
  name: prometheus-yaml
  namespace: monitoring
