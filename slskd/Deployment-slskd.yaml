apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: slskd
  name: slskd
  namespace: arr
spec:
  minReadySeconds: 10
  replicas: 1
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      name: slskd
  template:
    metadata:
      annotations:
        reloader.stakater.com/auto: "true"
      labels:
        name: slskd
    spec:
      containers:
      - env:
        - name: SLSKD_REMOTE_CONFIGURATION
          valueFrom:
            configMapKeyRef:
              key: SLSKD_REMOTE_CONFIGURATION
              name: slskd-config-env
        - name: SLSKD_SHARED_DIR
          valueFrom:
            configMapKeyRef:
              key: SLSKD_SHARED_DIR
              name: slskd-config-env
        - name: TZ
          valueFrom:
            configMapKeyRef:
              key: TZ
              name: slskd-config-env
        - name: SLSKD_API_KEY
          valueFrom:
            secretKeyRef:
              key: SLSKD_API_KEY
              name: slskd-sealed-secret
        - name: SLSKD_SLSK_PASSWORD
          valueFrom:
            secretKeyRef:
              key: SLSKD_SLSK_PASSWORD
              name: slskd-sealed-secret
        - name: SLSKD_SLSK_USERNAME
          valueFrom:
            secretKeyRef:
              key: SLSKD_SLSK_USERNAME
              name: slskd-sealed-secret
        image: slskd/slskd:0.24.5
        imagePullPolicy: IfNotPresent
        livenessProbe:
          failureThreshold: 3
          httpGet:
            path: /health
            port: 5030
            scheme: HTTP
          initialDelaySeconds: 15
          periodSeconds: 30
          timeoutSeconds: 5
        name: slskd
        ports:
        - containerPort: 5030
          name: http
        - containerPort: 5031
          name: https
        - containerPort: 50300
          name: slsk
        readinessProbe:
          failureThreshold: 3
          httpGet:
            path: /health
            port: 5030
            scheme: HTTP
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 5
        securityContext:
          runAsGroup: 100
          runAsUser: 1000
        startupProbe:
          failureThreshold: 30
          httpGet:
            path: /health
            port: 5030
            scheme: HTTP
          periodSeconds: 10
          timeoutSeconds: 5
        volumeMounts:
        - mountPath: /app/data
          name: data
        - mountPath: /music
          name: music
        - mountPath: /downloads
          name: downloads
        - mountPath: /incomplete
          name: incomplete
        - mountPath: /app/slskd.yml
          name: slskd-yml
          subPath: slskd.yml
      volumes:
      - hostPath:
          path: /data/arr/slskd/data
        name: data
      - hostPath:
          path: /cold-data/media/music/library/all
        name: music
      - hostPath:
          path: /cold-data/media/music/downloads
        name: downloads
      - hostPath:
          path: /cold-data/media/music/incomplete
        name: incomplete
      - configMap:
          name: slskd-yml
        name: slskd-yml
