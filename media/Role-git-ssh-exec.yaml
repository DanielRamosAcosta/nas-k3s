apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: git-ssh-exec
  namespace: media
rules:
- apiGroups:
  - ""
  resourceNames:
  - gitea-0
  resources:
  - pods
  verbs:
  - get
  - list
- apiGroups:
  - ""
  resourceNames:
  - gitea-0
  resources:
  - pods/exec
  verbs:
  - create
