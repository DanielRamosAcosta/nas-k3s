apiVersion: v1
kind: Service
metadata:
  labels:
    app: deluge
    name: deluge
  name: deluge
  namespace: arr
spec:
  ports:
  - name: deluge-web
    port: 8112
    targetPort: 8112
  - name: deluge-daemon
    port: 58846
    targetPort: 58846
  - name: deluge-peer-tcp
    port: 58946
    targetPort: 58946
  - name: deluge-peer-udp
    port: 58946
    protocol: UDP
    targetPort: 58946
  selector:
    name: deluge
