apiVersion: v1
kind: Service
metadata:
  labels:
    app: crowdsec
    app.kubernetes.io/managed-by: Helmraiser
  name: crowdsec-service
  namespace: system
spec:
  ports:
  - name: metrics
    port: 6060
    protocol: TCP
    targetPort: 6060
  - name: lapi
    port: 8080
    protocol: TCP
    targetPort: 8080
  selector:
    k8s-app: crowdsec
    type: lapi
    version: v1
  type: ClusterIP
