apiVersion: apps/v1
kind: DaemonSet
metadata:
  labels:
    app: crowdsec
    app.kubernetes.io/managed-by: Helmraiser
    k8s-app: crowdsec
    type: agent
    version: v1
  name: crowdsec-agent
  namespace: system
spec:
  selector:
    matchLabels:
      k8s-app: crowdsec
      type: agent
  template:
    metadata:
      annotations:
        checksum/acquis-configmap: 10cc7b46398a71cf0b25eac2c8c89d283970beffd4676ecf2cd28b9d1c7d404b
        checksum/agent-configmap: 524e841fd2661b639b1cc3aee213e22b04572ed44b8d8c81289d7e16b76bab8c
        reloader.stakater.com/auto: "true"
      labels:
        k8s-app: crowdsec
        type: agent
        version: v1
    spec:
      containers:
      - command:
        - sh
        - -c
        - cp /tmp_config/local_api_credentials.yaml /staging/etc/crowdsec/local_api_credentials.yaml
          && ./docker_start.sh
        env:
        - name: DISABLE_LOCAL_API
          value: "true"
        - name: DISABLE_ONLINE_API
          value: "true"
        - name: CROWDSEC_BYPASS_DB_VOLUME_CHECK
          value: "true"
        - name: LOCAL_API_URL
          value: http://crowdsec-service.system:8080
        - name: COLLECTIONS
          value: crowdsecurity/traefik crowdsecurity/linux crowdsecurity/http-cve
            crowdsecurity/base-http-scenarios crowdsecurity/geoip-enrich
        - name: MAXMIND_ACCOUNT_ID
          valueFrom:
            secretKeyRef:
              key: MAXMIND_ACCOUNT_ID
              name: crowdsec-maxmind
        - name: MAXMIND_LICENCE_KEY
          valueFrom:
            secretKeyRef:
              key: MAXMIND_LICENCE_KEY
              name: crowdsec-maxmind
        image: crowdsecurity/crowdsec:v1.7.7
        imagePullPolicy: IfNotPresent
        livenessProbe:
          failureThreshold: 3
          httpGet:
            path: /metrics
            port: metrics
            scheme: HTTP
          periodSeconds: 10
          successThreshold: 1
          timeoutSeconds: 5
        name: crowdsec-agent
        ports:
        - containerPort: 6060
          name: metrics
          protocol: TCP
        readinessProbe:
          failureThreshold: 3
          httpGet:
            path: /metrics
            port: metrics
            scheme: HTTP
          periodSeconds: 10
          successThreshold: 1
          timeoutSeconds: 5
        resources:
          limits:
            cpu: 500m
            memory: 300Mi
          requests:
            cpu: 100m
            memory: 150Mi
        securityContext:
          allowPrivilegeEscalation: false
          privileged: false
        startupProbe:
          failureThreshold: 30
          httpGet:
            path: /metrics
            port: metrics
            scheme: HTTP
          periodSeconds: 10
          successThreshold: 1
          timeoutSeconds: 5
        volumeMounts:
        - mountPath: /tmp_config
          name: crowdsec-config
        - mountPath: /etc/crowdsec/acquis.yaml
          name: acquis-config-volume
          subPath: acquis.yaml
        - mountPath: /var/log
          name: varlog
          readOnly: true
        - mountPath: /var/lib/docker/containers
          name: varlibdockercontainers
          readOnly: true
      initContainers:
      - command:
        - sh
        - -c
        - until nc "$LAPI_HOST" "$LAPI_PORT" -z; do echo waiting for lapi to start;
          sleep 5; done; ln -s /staging/etc/crowdsec /etc/crowdsec && cscli lapi register
          --machine "$USERNAME" -u "$LAPI_URL" --token "$REGISTRATION_TOKEN" && cp
          /etc/crowdsec/local_api_credentials.yaml /tmp_config/local_api_credentials.yaml
        env:
        - name: REGISTRATION_TOKEN
          valueFrom:
            secretKeyRef:
              key: registrationToken
              name: crowdsec-lapi-secrets
        - name: USERNAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: LAPI_URL
          value: http://crowdsec-service.system:8080
        - name: LAPI_HOST
          value: crowdsec-service.system
        - name: LAPI_PORT
          value: "8080"
        image: crowdsecurity/crowdsec:v1.7.7
        imagePullPolicy: IfNotPresent
        name: wait-for-lapi-and-register
        resources:
          limits:
            memory: 50Mi
          requests:
            cpu: 1m
            memory: 10Mi
        securityContext:
          allowPrivilegeEscalation: false
          privileged: false
        volumeMounts:
        - mountPath: /tmp_config
          name: crowdsec-config
      terminationGracePeriodSeconds: 30
      volumes:
      - configMap:
          name: acquis-configmap
        name: acquis-config-volume
      - emptyDir: {}
        name: crowdsec-config
      - hostPath:
          path: /var/log
        name: varlog
      - hostPath:
          path: /var/lib/docker/containers
        name: varlibdockercontainers
