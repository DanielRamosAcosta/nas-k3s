apiVersion: v1
kind: Pod
metadata:
  annotations:
    helm.sh/hook: test
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
  labels:
    app: crowdsec
    app.kubernetes.io/managed-by: Helmraiser
  name: crowdsec-test-agent
  namespace: system
spec:
  containers:
  - command:
    - /bin/sh
    - -ec
    - |
      curl -XGET http://crowdsec-agent-service:6060/metrics
    image: curlimages/curl
    name: crowdsec-test-agent
  restartPolicy: Never
