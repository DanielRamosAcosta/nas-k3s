apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: authelia
  name: authelia
  namespace: auth
spec:
  minReadySeconds: 10
  replicas: 1
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      name: authelia
  template:
    metadata:
      annotations:
        reloader.stakater.com/auto: "true"
      labels:
        name: authelia
    spec:
      containers:
      - env:
        - name: AUTHELIA_SESSION_SECRET
          valueFrom:
            secretKeyRef:
              key: AUTHELIA_SESSION_SECRET
              name: authelia-sealed-secret
        - name: AUTHELIA_STORAGE_ENCRYPTION_KEY
          valueFrom:
            secretKeyRef:
              key: AUTHELIA_STORAGE_ENCRYPTION_KEY
              name: authelia-sealed-secret
        - name: IDENTITY_PROVIDERS_OIDC_CLIENTS_ARGOCD_CLIENT_ID
          valueFrom:
            secretKeyRef:
              key: IDENTITY_PROVIDERS_OIDC_CLIENTS_ARGOCD_CLIENT_ID
              name: authelia-sealed-secret
        - name: IDENTITY_PROVIDERS_OIDC_CLIENTS_ARGOCD_CLIENT_SECRET_DIGEST
          valueFrom:
            secretKeyRef:
              key: IDENTITY_PROVIDERS_OIDC_CLIENTS_ARGOCD_CLIENT_SECRET_DIGEST
              name: authelia-sealed-secret
        - name: IDENTITY_PROVIDERS_OIDC_CLIENTS_ARGOCD_CLI_CLIENT_ID
          valueFrom:
            secretKeyRef:
              key: IDENTITY_PROVIDERS_OIDC_CLIENTS_ARGOCD_CLI_CLIENT_ID
              name: authelia-sealed-secret
        - name: IDENTITY_PROVIDERS_OIDC_CLIENTS_BOOKLORE_CLIENT_ID
          valueFrom:
            secretKeyRef:
              key: IDENTITY_PROVIDERS_OIDC_CLIENTS_BOOKLORE_CLIENT_ID
              name: authelia-sealed-secret
        - name: IDENTITY_PROVIDERS_OIDC_CLIENTS_FACTURASCRIPTS_CLIENT_ID
          valueFrom:
            secretKeyRef:
              key: IDENTITY_PROVIDERS_OIDC_CLIENTS_FACTURASCRIPTS_CLIENT_ID
              name: authelia-sealed-secret
        - name: IDENTITY_PROVIDERS_OIDC_CLIENTS_FACTURASCRIPTS_CLIENT_SECRET_DIGEST
          valueFrom:
            secretKeyRef:
              key: IDENTITY_PROVIDERS_OIDC_CLIENTS_FACTURASCRIPTS_CLIENT_SECRET_DIGEST
              name: authelia-sealed-secret
        - name: IDENTITY_PROVIDERS_OIDC_CLIENTS_GRAFANA_CLIENT_ID
          valueFrom:
            secretKeyRef:
              key: IDENTITY_PROVIDERS_OIDC_CLIENTS_GRAFANA_CLIENT_ID
              name: authelia-sealed-secret
        - name: IDENTITY_PROVIDERS_OIDC_CLIENTS_GRAFANA_CLIENT_SECRET_DIGEST
          valueFrom:
            secretKeyRef:
              key: IDENTITY_PROVIDERS_OIDC_CLIENTS_GRAFANA_CLIENT_SECRET_DIGEST
              name: authelia-sealed-secret
        - name: IDENTITY_PROVIDERS_OIDC_CLIENTS_IMMICH_CLIENT_ID
          valueFrom:
            secretKeyRef:
              key: IDENTITY_PROVIDERS_OIDC_CLIENTS_IMMICH_CLIENT_ID
              name: authelia-sealed-secret
        - name: IDENTITY_PROVIDERS_OIDC_CLIENTS_IMMICH_CLIENT_SECRET_DIGEST
          valueFrom:
            secretKeyRef:
              key: IDENTITY_PROVIDERS_OIDC_CLIENTS_IMMICH_CLIENT_SECRET_DIGEST
              name: authelia-sealed-secret
        - name: IDENTITY_PROVIDERS_OIDC_CLIENTS_JELLYFIN_CLIENT_ID
          valueFrom:
            secretKeyRef:
              key: IDENTITY_PROVIDERS_OIDC_CLIENTS_JELLYFIN_CLIENT_ID
              name: authelia-sealed-secret
        - name: IDENTITY_PROVIDERS_OIDC_CLIENTS_JELLYFIN_CLIENT_SECRET_DIGEST
          valueFrom:
            secretKeyRef:
              key: IDENTITY_PROVIDERS_OIDC_CLIENTS_JELLYFIN_CLIENT_SECRET_DIGEST
              name: authelia-sealed-secret
        - name: IDENTITY_PROVIDERS_OIDC_CLIENTS_SFTPGO_CLIENT_ID
          valueFrom:
            secretKeyRef:
              key: IDENTITY_PROVIDERS_OIDC_CLIENTS_SFTPGO_CLIENT_ID
              name: authelia-sealed-secret
        - name: IDENTITY_PROVIDERS_OIDC_CLIENTS_SFTPGO_CLIENT_SECRET_DIGEST
          valueFrom:
            secretKeyRef:
              key: IDENTITY_PROVIDERS_OIDC_CLIENTS_SFTPGO_CLIENT_SECRET_DIGEST
              name: authelia-sealed-secret
        - name: AUTHELIA_STORAGE_POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              key: AUTHELIA_STORAGE_POSTGRES_PASSWORD
              name: authelia-shared-sealed-secret
        - name: X_AUTHELIA_CONFIG_FILTERS
          valueFrom:
            configMapKeyRef:
              key: X_AUTHELIA_CONFIG_FILTERS
              name: authelia-config-env
        image: ghcr.io/authelia/authelia:4.39.16
        imagePullPolicy: IfNotPresent
        livenessProbe:
          failureThreshold: 3
          httpGet:
            path: /api/health
            port: 9091
            scheme: HTTP
          initialDelaySeconds: 15
          periodSeconds: 30
          timeoutSeconds: 5
        name: authelia
        ports:
        - containerPort: 9091
          name: http
        readinessProbe:
          failureThreshold: 3
          httpGet:
            path: /api/health
            port: 9091
            scheme: HTTP
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 5
        volumeMounts:
        - mountPath: /config/configuration.yml
          name: configuration-yml
          subPath: configuration.yml
        - mountPath: /config/users_database.yml
          name: merged-users
          readOnly: true
          subPath: users_database.yml
        - mountPath: /config/secrets/oidc/jwks/rsa.2048.key
          name: rsa-2048-key-sealed-secret
          subPath: rsa.2048.key
      enableServiceLinks: false
      initContainers:
      - command:
        - sh
        - -c
        - envsubst < /data/users_database.yml > /output/users_database.yml
        env:
        - name: USER_ADMIN_PASSWORD
          valueFrom:
            secretKeyRef:
              key: USER_ADMIN_PASSWORD
              name: authelia-user-passwords
        - name: USER_ALEX_PASSWORD
          valueFrom:
            secretKeyRef:
              key: USER_ALEX_PASSWORD
              name: authelia-user-passwords
        - name: USER_ALE_PASSWORD
          valueFrom:
            secretKeyRef:
              key: USER_ALE_PASSWORD
              name: authelia-user-passwords
        - name: USER_ANA_PASSWORD
          valueFrom:
            secretKeyRef:
              key: USER_ANA_PASSWORD
              name: authelia-user-passwords
        - name: USER_CRIS_PASSWORD
          valueFrom:
            secretKeyRef:
              key: USER_CRIS_PASSWORD
              name: authelia-user-passwords
        - name: USER_DANI_PASSWORD
          valueFrom:
            secretKeyRef:
              key: USER_DANI_PASSWORD
              name: authelia-user-passwords
        - name: USER_GABRIEL_PASSWORD
          valueFrom:
            secretKeyRef:
              key: USER_GABRIEL_PASSWORD
              name: authelia-user-passwords
        image: docker.io/bhgedigital/envsubst:v1.0-alpine3.6
        imagePullPolicy: IfNotPresent
        name: render-users
        volumeMounts:
        - mountPath: /data/users_database.yml
          name: users-database-yml
          subPath: users_database.yml
        - mountPath: /output
          name: merged-users
      volumes:
      - configMap:
          name: configuration-yml
        name: configuration-yml
      - name: rsa-2048-key-sealed-secret
        secret:
          secretName: rsa-2048-key-sealed-secret
      - configMap:
          name: users-database-yml
        name: users-database-yml
      - emptyDir: {}
        name: merged-users
