apiVersion: v1
data:
  invidious-config.json: |-
    {
      "admins": [
        "dani"
      ],
      "check_tables": true,
      "db": {
        "dbname": "invidious",
        "host": "postgres.databases.svc.cluster.local",
        "password": "$DB_PASSWORD",
        "port": 5432,
        "user": "invidious"
      },
      "default_user_preferences": {
        "autoplay": true,
        "captions": [
          "Spanish",
          "Spanish (Latin America)",
          "English"
        ],
        "continue": true,
        "locale": "es",
        "region": "ES",
        "save_player_pos": true
      },
      "domain": "invidious.danielramos.me",
      "hmac_key": "$HMAC_KEY",
      "https_only": true,
      "invidious_companion": [
        {
          "private_url": "http://invidious-companion.media.svc.cluster.local:8282/companion"
        }
      ],
      "invidious_companion_key": "$INVIDIOUS_COMPANION_KEY",
      "registration_enabled": false
    }
kind: ConfigMap
metadata:
  labels:
    app: invidious
  name: invidious-config-json
  namespace: media
