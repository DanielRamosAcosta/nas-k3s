apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  labels:
    app: invidious
  name: invidious-ingressroute
  namespace: media
spec:
  entryPoints:
  - websecure
  routes:
  - kind: Rule
    match: Host(`invidious.danielramos.me`)
    services:
    - name: invidious
      port: 3000
  tls:
    store:
      name: default
