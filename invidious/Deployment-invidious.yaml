apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: invidious
  name: invidious
  namespace: media
spec:
  minReadySeconds: 10
  replicas: 1
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      name: invidious
  template:
    metadata:
      annotations:
        reloader.stakater.com/auto: "true"
      labels:
        name: invidious
    spec:
      containers:
      - command:
        - sh
        - -c
        - export INVIDIOUS_CONFIG="$(cat /merged-config/config.json)" && exec /invidious/invidious
        image: quay.io/invidious/invidious:2.20260207.0
        imagePullPolicy: IfNotPresent
        livenessProbe:
          failureThreshold: 3
          initialDelaySeconds: 15
          periodSeconds: 30
          tcpSocket:
            port: 3000
          timeoutSeconds: 5
        name: invidious
        ports:
        - containerPort: 3000
          name: http
        readinessProbe:
          failureThreshold: 3
          initialDelaySeconds: 5
          periodSeconds: 10
          tcpSocket:
            port: 3000
          timeoutSeconds: 5
        volumeMounts:
        - mountPath: /merged-config
          name: merged-config
          readOnly: true
      enableServiceLinks: false
      initContainers:
      - command:
        - sh
        - -c
        - envsubst < /data/invidious-config.json > /output/config.json
        env:
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              key: DB_PASSWORD
              name: invidious-sealed-secret
        - name: HMAC_KEY
          valueFrom:
            secretKeyRef:
              key: HMAC_KEY
              name: invidious-sealed-secret
        - name: INVIDIOUS_COMPANION_KEY
          valueFrom:
            secretKeyRef:
              key: INVIDIOUS_COMPANION_KEY
              name: invidious-sealed-secret
        image: docker.io/bhgedigital/envsubst:v1.0-alpine3.6
        imagePullPolicy: IfNotPresent
        name: render-config
        volumeMounts:
        - mountPath: /data/invidious-config.json
          name: invidious-config-json
          subPath: invidious-config.json
        - mountPath: /output
          name: merged-config
      volumes:
      - configMap:
          name: invidious-config-json
        name: invidious-config-json
      - emptyDir: {}
        name: merged-config
