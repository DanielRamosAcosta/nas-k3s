apiVersion: v1
kind: PersistentVolume
metadata:
  labels:
    app: sftpgo
  name: sftpgo-pv
spec:
  accessModes:
  - ReadWriteOnce
  capacity:
    storage: 40Gi
  hostPath:
    path: /cold-data/sftpgo/data
    type: DirectoryOrCreate
  persistentVolumeReclaimPolicy: Retain
  storageClassName: local-path
