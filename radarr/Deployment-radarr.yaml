apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: radarr
  name: radarr
  namespace: arr
spec:
  minReadySeconds: 10
  replicas: 1
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      name: radarr
  template:
    metadata:
      annotations:
        reloader.stakater.com/auto: "true"
      labels:
        name: radarr
    spec:
      containers:
      - env:
        - name: PGID
          valueFrom:
            configMapKeyRef:
              key: PGID
              name: radarr-config-env
        - name: PUID
          valueFrom:
            configMapKeyRef:
              key: PUID
              name: radarr-config-env
        - name: RADARR__LOG__CONSOLEFORMAT
          valueFrom:
            configMapKeyRef:
              key: RADARR__LOG__CONSOLEFORMAT
              name: radarr-config-env
        - name: TZ
          valueFrom:
            configMapKeyRef:
              key: TZ
              name: radarr-config-env
        - name: UMASK
          valueFrom:
            configMapKeyRef:
              key: UMASK
              name: radarr-config-env
        image: ghcr.io/hotio/radarr:release-6.1.1.10360
        imagePullPolicy: IfNotPresent
        livenessProbe:
          failureThreshold: 3
          httpGet:
            path: /ping
            port: 7878
            scheme: HTTP
          initialDelaySeconds: 15
          periodSeconds: 30
          timeoutSeconds: 5
        name: radarr
        ports:
        - containerPort: 7878
          name: http
        readinessProbe:
          failureThreshold: 3
          httpGet:
            path: /ping
            port: 7878
            scheme: HTTP
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 5
        volumeMounts:
        - mountPath: /config
          name: config
        - mountPath: /data
          name: data
      volumes:
      - hostPath:
          path: /data/arr/radarr
        name: config
      - hostPath:
          path: /cold-data/media
        name: data
