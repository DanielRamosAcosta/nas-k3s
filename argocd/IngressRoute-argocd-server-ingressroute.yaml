apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  labels:
    app: argocd
  name: argocd-server-ingressroute
  namespace: argocd
spec:
  entryPoints:
  - websecure
  routes:
  - kind: Rule
    match: Host(`argocd.danielramos.me`)
    services:
    - name: argocd-server
      port: 80
  tls:
    certResolver: le
