apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  labels:
    app: booklore
  name: booklore-ingressroute
  namespace: media
spec:
  entryPoints:
  - websecure
  routes:
  - kind: Rule
    match: Host(`books.danielramos.me`)
    services:
    - name: booklore
      port: 6060
  tls:
    store:
      name: default
