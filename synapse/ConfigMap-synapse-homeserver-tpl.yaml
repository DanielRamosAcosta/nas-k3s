apiVersion: v1
data:
  homeserver.yaml: |
    server_name: "matrix.danielramos.me"
    public_baseurl: "https://matrix.danielramos.me"

    data_directory: /data
    signing_key_path: /keys/signing.key
    media_store_path: /media

    listeners:
      - port: 8008
        x_forwarded: true
        bind_addresses: ['0.0.0.0']
        resources:
          - names: [client]
      - port: 9090
        type: metrics
        bind_addresses: ['0.0.0.0']

    database:
      name: psycopg2
      txn_limit: 10000
      args:
        user: synapse
        host: postgres.databases.svc.cluster.local
        database: synapse
        password: "${SYNAPSE_DB_PASSWORD}"

    macaroon_secret_key: "${MACAROON_SECRET_KEY}"
    registration_shared_secret: "${REGISTRATION_SHARED_SECRET}"
    form_secret: "${FORM_SECRET}"

    report_stats: false
    suppress_key_server_warning: true
    enable_metrics: true

    password_config:
      enabled: false
kind: ConfigMap
metadata:
  labels:
    app: synapse
  name: synapse-homeserver-tpl
  namespace: communications
