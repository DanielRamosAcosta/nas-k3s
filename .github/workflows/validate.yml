name: Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  validate:
    name: Validate Tanka environments
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Jsonnet & jsonnet-bundler
        uses: kobtea/setup-jsonnet-action@v2

      - name: Setup Tanka
        uses: unfunco/setup-tanka@1.0.0-alpha.1
        with:
          tanka-version: "0.36.2"

      - name: Install dependencies
        run: |
          jb install
          tk tool charts vendor

      - name: Check formatting
        run: tk fmt --test environments/ lib/

      - name: Validate all environments
        run: |
          failed=0
          for env in environments/*/; do
            env="${env%/}"
            echo "::group::tk eval $env"
            if tk eval "$env" > /dev/null 2>&1; then
              echo "✓ $env"
            else
              echo "::error::tk eval failed for $env"
              tk eval "$env"
              failed=1
            fi
            echo "::endgroup::"
          done
          exit $failed

      - name: Export manifests
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: tk export dist/ environments/ --recursive --format '{{index .metadata.labels "app"}}/{{.kind}}-{{.metadata.name}}'

      - name: Publish to manifests branch
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: manifests
