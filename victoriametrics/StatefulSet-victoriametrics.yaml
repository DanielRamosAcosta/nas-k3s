apiVersion: apps/v1
kind: StatefulSet
metadata:
  labels:
    app: victoriametrics
  name: victoriametrics
  namespace: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      name: victoriametrics
  template:
    metadata:
      annotations:
        reloader.stakater.com/auto: "true"
      labels:
        name: victoriametrics
    spec:
      containers:
      - args:
        - -promscrape.config=/etc/victoriametrics/victoriametrics.yml
        - -storageDataPath=/victoria-metrics-data
        - -retentionPeriod=100y
        - -downsampling.period=90d:1m
        - -downsampling.period=360d:5m
        - -licenseFile=/etc/vm-license/vm-license
        image: victoriametrics/victoria-metrics:v1.142.0-enterprise
        imagePullPolicy: IfNotPresent
        livenessProbe:
          failureThreshold: 3
          httpGet:
            path: /-/healthy
            port: 8428
            scheme: HTTP
          initialDelaySeconds: 15
          periodSeconds: 30
          timeoutSeconds: 5
        name: victoriametrics
        ports:
        - containerPort: 8428
          name: http
        readinessProbe:
          failureThreshold: 3
          httpGet:
            path: /-/healthy
            port: 8428
            scheme: HTTP
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 5
        startupProbe:
          failureThreshold: 30
          httpGet:
            path: /-/healthy
            port: 8428
            scheme: HTTP
          periodSeconds: 10
          timeoutSeconds: 5
        volumeMounts:
        - mountPath: /victoria-metrics-data
          name: data
        - mountPath: /etc/victoriametrics/victoriametrics.yml
          name: victoriametrics-yml
          subPath: victoriametrics.yml
        - mountPath: /etc/vm-license/vm-license
          name: vm-license-sealed-secret
          subPath: vm-license
      serviceAccount: victoriametrics
      volumes:
      - configMap:
          name: victoriametrics-yml
        name: victoriametrics-yml
      - name: vm-license-sealed-secret
        secret:
          secretName: vm-license-sealed-secret
      - hostPath:
          path: /data/victoriametrics/data
        name: data
  updateStrategy:
    type: RollingUpdate
