apiVersion: apps/v1
kind: StatefulSet
metadata:
  labels:
    app: lidarr
  name: lidarr
  namespace: arr
spec:
  replicas: 1
  selector:
    matchLabels:
      name: lidarr
  template:
    metadata:
      labels:
        name: lidarr
    spec:
      containers:
      - env:
        - name: LIDARR__LOG__CONSOLEFORMAT
          valueFrom:
            configMapKeyRef:
              key: LIDARR__LOG__CONSOLEFORMAT
              name: lidarr-config-env
        - name: PGID
          valueFrom:
            configMapKeyRef:
              key: PGID
              name: lidarr-config-env
        - name: PUID
          valueFrom:
            configMapKeyRef:
              key: PUID
              name: lidarr-config-env
        - name: TZ
          valueFrom:
            configMapKeyRef:
              key: TZ
              name: lidarr-config-env
        - name: UMASK
          valueFrom:
            configMapKeyRef:
              key: UMASK
              name: lidarr-config-env
        image: ghcr.io/hotio/lidarr:release-3.1.0.4875
        imagePullPolicy: IfNotPresent
        name: lidarr
        ports:
        - containerPort: 8686
          name: http
        volumeMounts:
        - mountPath: /config
          name: config
        - mountPath: /data
          name: data
      volumes:
      - hostPath:
          path: /data/arr/lidarr
        name: config
      - hostPath:
          path: /cold-data/media
        name: data
  updateStrategy:
    type: RollingUpdate
