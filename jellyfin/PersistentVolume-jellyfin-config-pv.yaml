apiVersion: v1
kind: PersistentVolume
metadata:
  labels:
    app: jellyfin
  name: jellyfin-config-pv
spec:
  accessModes:
  - ReadWriteOnce
  capacity:
    storage: 25Gi
  hostPath:
    path: /data/jellyfin/config
    type: DirectoryOrCreate
  persistentVolumeReclaimPolicy: Retain
  storageClassName: local-path
